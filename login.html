<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Access — Rich Off Tech</title>
<link rel="stylesheet" href="/styles.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: radial-gradient(ellipse at center, rgba(238,9,121,0.1), transparent 70%), #0a0a0a;
  }
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
  }
  .login-logo {
    font-size: 32px; font-weight: 800;
    margin-bottom: 8px; letter-spacing: -1px;
  }
  .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-card .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
  .code-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border-bright);
    color: var(--text);
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .code-input:focus { border-color: var(--accent-orange); }
  .login-btn {
    width: 100%; margin-top: 16px; padding: 14px;
    font-size: 16px;
  }
  .login-foot {
    margin-top: 24px;
    color: var(--text-faint);
    font-size: 13px;
  }
  .login-foot a { color: var(--accent-orange); }
  .error-msg {
    color: #ff5252; font-size: 13px;
    margin-top: 12px; min-height: 18px;
  }
  .success-msg {
    color: #22c55e; font-size: 14px;
    margin-top: 12px; font-weight: 600;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo gradient-text">ROT</div>
  <h1>Member Access</h1>
  <p class="sub">Enter your access code to continue</p>

  <input type="text" class="code-input" id="code" placeholder="ACCESS CODE" maxlength="20" autofocus>
  <div class="error-msg" id="msg"></div>

  <button class="btn login-btn" id="enter-btn" type="button">Enter</button>

  <div class="login-foot">
    Don't have a code? <a href="https://square.link/u/gGNBn35n" target="_blank">Become a Founding Member</a>
    <br><br>
    <a href="/">&larr; Back to home</a>
  </div>
</div>

<script src="/widget.js?v=1779523743"></script>
<script>
const codeInput = document.getElementById("code");
const msg = document.getElementById("msg");
const btn = document.getElementById("enter-btn");

function submit() {
  const code = codeInput.value.trim().toUpperCase();
  msg.className = "error-msg";
  msg.textContent = "";

  if (code.length < 4) {
    msg.textContent = "Code too short. Try again.";
    return;
  }

  // DEMO ONLY — no real auth. Any code 4+ chars succeeds.
  msg.className = "success-msg";
  msg.textContent = "Locked in. Redirecting...";
  btn.disabled = true;
  setTimeout(() => {
    window.location.href = "/roster.html";
  }, 1200);
}

btn.addEventListener("click", submit);
codeInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") submit();
});
</script>

</body>
</html>
